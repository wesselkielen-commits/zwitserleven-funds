name: update funds

on:
  schedule:
    - cron: "0 18 * * 1-5"   # elke werkdag om 18:00
  workflow_dispatch:           # handmatig starten

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas lxml html5lib beautifulsoup4

      - name: Run update script
        run: |
          python script/update_db.py

      - name: Commit DB changes if any
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pension.db
          if ! git diff --cached --quiet; then
            git commit -m "Update pension.db"
            git push
          else
            echo "Geen wijzigingen, niks committen"
