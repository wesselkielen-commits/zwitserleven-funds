name: update funds

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-funds
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml html5lib beautifulsoup4

      - name: Run update script
        run: |
          python script/update_db.py

      - name: Commit DB changes if any
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pension.db data/prices.csv
          if git diff --cached --quiet; then
            echo "Geen wijzigingen, niks committen"
          else
            git commit -m "Update pension data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
